[pytest]

# --- 输出到文件 ---
log_file = ./log/test.log
log_file_level = INFO
log_file_format = %(asctime)s  %(filename)-16s  [函数：%(funcName)-16s]  [%(lineno)-3d]  %(levelname)-7s -- %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# --- 输出到控制台 ---
# 开启实时日志输出
log_cli = True
# 建议临时调低级别，确保能看到所有 info 和 debug
log_cli_level = INFO
log_cli_format = %(asctime)s  %(filename)-20s  [函数：%(funcName)-20s]  [%(lineno)-3d]  %(levelname)-7s -- %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
